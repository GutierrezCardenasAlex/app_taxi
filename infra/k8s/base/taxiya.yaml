apiVersion: v1
kind: Namespace
metadata:
  name: taxiya
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway-api
  namespace: taxiya
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gateway-api
  template:
    metadata:
      labels:
        app: gateway-api
    spec:
      containers:
        - name: gateway-api
          image: taxiya/gateway-api:latest
          ports:
            - containerPort: 3000
          envFrom:
            - secretRef:
                name: taxiya-env
---
apiVersion: v1
kind: Service
metadata:
  name: gateway-api
  namespace: taxiya
spec:
  selector:
    app: gateway-api
  ports:
    - port: 80
      targetPort: 3000
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: gateway-api
  namespace: taxiya
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: gateway-api
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70

